<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>Rainer Fang(志剛) 行事曆</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #f4f5f7;
        --card-bg: #ffffff;
        --border: #e3e6ea;
        --text: #1f2329;
        --text-muted: #6b7280;
        --accent: #4285f4;
        --radius: 16px;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg) url("background.webp") center / cover no-repeat fixed;
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
          "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        display: flex;
        justify-content: center;
        padding: 24px;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.28);
        pointer-events: none;
      }

      .frame {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 1100px;
        height: calc(100vh - 48px);
        display: flex;
        flex-direction: column;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .frame__header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 18px 24px;
        border-bottom: 1px solid var(--border);
      }

      .frame__dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
        flex-shrink: 0;
      }

      .frame__title {
        font-size: 17px;
        font-weight: 600;
        margin: 0;
      }

      .frame__subtitle {
        font-size: 13px;
        color: var(--text-muted);
        margin-left: auto;
      }

      .frame__body {
        flex: 1;
        position: relative;
      }

      .frame__body iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      @media (max-width: 600px) {
        body {
          padding: 12px;
        }

        .frame {
          height: calc(100vh - 24px);
          border-radius: 12px;
        }

        .frame__subtitle {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <header class="frame__header">
        <span class="frame__dot"></span>
        <h1 class="frame__title">Rainer Fang(志剛) 的行事曆</h1>
        <span class="frame__subtitle">Asia/Taipei</span>
      </header>
      <div class="frame__body">
        <iframe
          src="https://calendar.google.com/calendar/embed?height=600&wkst=2&ctz=Asia%2FTaipei&showPrint=0&title=Rainer(%E5%BF%97%E5%89%9B)%20%E7%9A%84%E8%A1%8C%E4%BA%8B%E6%9B%86&mode=WEEK&showCalendars=0&src=YWJjODczNjkzQGdtYWlsLmNvbQ&src=ODQ3ZTUwZDhlZDJjMTMwN2Y3M2ZlOGY3Y2QzZDIxOGI5MGMwMmFkOGQ4NjQwOWEzN2MzOWY0OTEzNjNlNDgzOEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=YjRiOWIyMjYzNDBkMGYxYmI3ZTdlMmYyYThkZTAyNzgxNjE0NmJjZGM0YWYwNDExNjAyOTA5YTY1ZjZjMmIxZUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=Y19lMDVhZTFjMTY2ODdmZTlmYjZjODBhYmIzMDJjYmU2YTg0ODc0MDIwYWE3ZWQwZTkxYWI1OGQzZmVkYTQxZWJkQGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&src=NXY0YmM1cWNrcmc1czcwNjQybjJhZjUwbXNAZ3JvdXAuY2FsZW5kYXIuZ29vZ2xlLmNvbQ&color=%234285f4&color=%23795548&color=%23039be5&color=%2333b679&color=%230b8043"
          frameborder="0"
          scrolling="no"
        ></iframe>
      </div>
    </main>
  </body>
</html>
